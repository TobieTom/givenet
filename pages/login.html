<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — GiveNet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    /* ── Page shell ─────────────────────────────────────────── */
    body {
      background-color: var(--color-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    .auth-page {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    @media (min-width: 992px) {
      body { padding: var(--spacing-lg); align-items: stretch; }
      .auth-page {
        min-height: auto;
        max-width: 980px;
        margin: auto;
        border-radius: var(--radius-xl);
        overflow: hidden;
        box-shadow: var(--shadow-xl);
        min-height: 600px;
      }
    }

    /* ── Hero panel ─────────────────────────────────────────── */
    .auth-hero {
      display: none;
      flex: 0 0 45%;
      position: relative;
      overflow: hidden;
      height: 100vh;
    }

    @media (min-width: 992px) {
      .auth-hero { display: flex; flex-direction: column; justify-content: flex-end; }
    }

    .auth-hero-photo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 0;
    }

    .auth-hero-gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      z-index: 1;
    }

    .auth-hero-content {
      position: absolute;
      bottom: 32px;
      left: 24px;
      right: 24px;
      z-index: 2;
      color: var(--color-white);
    }

    .hero-stars {
      display: flex;
      gap: 3px;
      color: var(--warning-500);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .hero-quote {
      font-size: var(--text-lg);
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 20px;
    }

    .hero-avatars {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar-stack {
      display: flex;
    }

    .avatar-stack .av {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-full);
      border: 2px solid var(--color-white);
      object-fit: cover;
      margin-left: -9px;
      background-color: var(--primary-300);
    }

    .avatar-stack .av:first-child { margin-left: 0; }

    .avatar-count {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-full);
      border: 2px solid var(--color-white);
      background-color: var(--primary-700);
      color: var(--color-white);
      font-size: var(--text-xs);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -9px;
    }

    .hero-member-text {
      font-size: var(--text-sm);
      color: rgba(255,255,255,0.88);
    }

    /* ── Form panel ─────────────────────────────────────────── */
    .auth-form-panel {
      flex: 1;
      background-color: var(--color-white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 52px 40px;
    }

    @media (max-width: 991px) {
      .auth-form-panel { padding: 48px 24px; }
    }

    .auth-form-inner {
      width: 100%;
      max-width: 380px;
    }

    /* Logo */
    .auth-logo {
      display: block;
      margin-bottom: 32px;
      text-decoration: none;
    }

    .auth-logo img {
      height: 44px;
      width: auto;
    }

    /* Headings */
    .auth-title {
      font-size: var(--text-2xl);
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .auth-subtitle {
      font-size: var(--text-sm);
      color: var(--neutral-500);
      margin-bottom: 28px;
    }

    /* Form group spacing */
    .form-group-gn {
      margin-bottom: 18px;
    }

    /* Pill inputs — auth override */
    .pill-input {
      border-radius: var(--radius-full) !important;
      padding-left: 20px !important;
      padding-right: 20px !important;
    }

    .pill-input.with-icon-right {
      padding-right: 46px !important;
    }

    /* Remember + Forgot row */
    .form-options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: var(--text-sm);
      color: var(--text-700);
      cursor: pointer;
      user-select: none;
    }

    .remember-label input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--color-primary);
      cursor: pointer;
      flex-shrink: 0;
    }

    .forgot-link {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-primary);
      text-decoration: none;
      white-space: nowrap;
    }

    .forgot-link:hover { text-decoration: underline; }

    /* Disabled button */
    #submitBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Google button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 11px 20px;
      border: 1.5px solid var(--neutral-300);
      border-radius: var(--radius-full);
      background-color: var(--color-white);
      color: var(--text-800);
      font-size: var(--text-base);
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background-color var(--transition-base), border-color var(--transition-base);
    }

    .btn-google:hover {
      background-color: var(--gray-50);
      border-color: var(--neutral-400);
    }

    /* Bottom sign-up prompt */
    .auth-alt-prompt {
      text-align: center;
      margin-top: 22px;
      font-size: var(--text-sm);
      color: var(--neutral-500);
    }

    .auth-alt-prompt a {
      color: var(--color-primary);
      font-weight: 700;
      text-decoration: none;
    }

    .auth-alt-prompt a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="auth-page">

    <!-- ── Hero Panel ─────────────────────────────────────── -->
    <div class="auth-hero" aria-hidden="true">
      <img
        class="auth-hero-photo"
        src="../assets/images/image 55 1.png"
        alt=""
      />
      <div class="auth-hero-gradient"></div>
      <div class="auth-hero-content">
        <div class="hero-stars">
          <i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i>
        </div>
        <p class="hero-quote">
          "Generosity isn't just about giving. It's about creating a world where everyone belongs"
        </p>
        <div class="hero-avatars">
          <div class="avatar-stack">
            <img class="av" src="../assets/images/Avatar.png" alt="" />
            <img class="av" src="../assets/images/Avatar (4) 1.png" alt="" />
            <div class="av" style="background-color: var(--primary-400);"></div>
            <span class="avatar-count">+2k</span>
          </div>
          <span class="hero-member-text">Join 20,000+ people in your community</span>
        </div>
      </div>
    </div>

    <!-- ── Form Panel ─────────────────────────────────────── -->
    <div class="auth-form-panel">
      <div class="auth-form-inner">

        <a href="../index.html" class="auth-logo">
          <img src="../assets/images/logo-small.png" alt="GiveNet" />
        </a>

        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Log in to start giving or receiving in your community.</p>

        <form id="loginForm" novalidate>

          <div class="form-group-gn">
            <label class="form-label-gn" for="email">Email Address</label>
            <input
              type="email"
              id="email"
              class="form-input-gn pill-input"
              placeholder="name@example.com"
              autocomplete="email"
            />
          </div>

          <div class="form-group-gn">
            <label class="form-label-gn" for="password">Password</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                class="form-input-gn pill-input with-icon-right"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
              <button type="button" class="input-icon-right" id="togglePassword" aria-label="Show password">
                <i class="bi bi-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>

          <div class="form-options-row">
            <label class="remember-label">
              <input type="checkbox" id="rememberMe" />
              Remember for 30 days
            </label>
            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
          </div>

          <button
            type="submit"
            class="btn-gn-primary btn-gn-full"
            id="submitBtn"
            style="border-radius: var(--radius-full);"
            disabled
          >
            <span id="btnText">Sign In</span>
            <span id="btnSpinner" class="d-none">
              <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            </span>
          </button>

        </form>

        <div class="divider-or">or</div>

        <button class="btn-google" type="button" id="googleBtn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 12.075 17.64 9.767 17.64 9.2z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>

        <p class="auth-alt-prompt">
          Don't have an account? <a href="signup.html">Create Account</a>
        </p>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { auth, db }     from '../js/firebase-config.js';
    import { requireGuest } from '../js/auth-guard.js';
    import { showToast }    from '../js/utils.js';
    import { signInWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    requireGuest();

    const emailInput = document.getElementById('email');
    const pwInput    = document.getElementById('password');
    const submitBtn  = document.getElementById('submitBtn');
    const btnText    = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const toggleBtn  = document.getElementById('togglePassword');
    const toggleIcon = document.getElementById('toggleIcon');

    function syncButton() {
      const ready = emailInput.value.trim() !== '' && pwInput.value !== '';
      submitBtn.disabled = !ready;
    }

    emailInput.addEventListener('input', syncButton);
    pwInput.addEventListener('input', syncButton);
    syncButton();

    toggleBtn.addEventListener('click', () => {
      const showing = pwInput.type === 'text';
      pwInput.type         = showing ? 'password' : 'text';
      toggleIcon.className = showing ? 'bi bi-eye' : 'bi bi-eye-slash';
      toggleBtn.ariaLabel  = showing ? 'Show password' : 'Hide password';
    });

    function friendlyError(code) {
      const map = {
        'auth/user-not-found':     'No account found with this email.',
        'auth/wrong-password':     'Incorrect password. Please try again.',
        'auth/invalid-credential': 'Invalid email or password.',
        'auth/invalid-email':      'Please enter a valid email address.',
        'auth/user-disabled':      'This account has been disabled.',
        'auth/too-many-requests':  'Too many attempts. Please try again later.',
      };
      return map[code] ?? 'Sign in failed. Please try again.';
    }

    function setLoading(on) {
      submitBtn.disabled  = on;
      btnText.textContent = on ? 'Signing in…' : 'Sign In';
      btnSpinner.classList.toggle('d-none', !on);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = emailInput.value.trim();
      const password = pwInput.value;
      setLoading(true);
      try {
        const { user } = await signInWithEmailAndPassword(auth, email, password);
        const snap     = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) {
          showToast('Account data not found. Please contact support.', 'error');
          setLoading(false);
          return;
        }
        const role = snap.data().role;
        if (role === 'admin')          window.location.href = 'admin-dashboard.html';
        else if (role === 'recipient') window.location.href = 'recipient-dashboard.html';
        else                           window.location.href = 'donor-dashboard.html';
      } catch (err) {
        showToast(friendlyError(err.code), 'error');
        setLoading(false);
      }
    });

    document.getElementById('googleBtn').addEventListener('click', () => {
      showToast('Google sign-in coming soon', 'warning');
    });
  </script>

</body>
</html>
