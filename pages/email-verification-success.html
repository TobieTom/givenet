<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified — GiveNet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    body {
      background-color: var(--color-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    .auth-page {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    @media (min-width: 992px) {
      body { padding: var(--spacing-lg); align-items: stretch; }
      .auth-page {
        max-width: 980px;
        margin: auto;
        border-radius: var(--radius-xl);
        overflow: hidden;
        box-shadow: var(--shadow-xl);
        min-height: 600px;
      }
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .auth-hero {
      display: none;
      flex: 0 0 45%;
      position: relative;
      overflow: hidden;
      height: 100vh;
    }

    @media (min-width: 992px) { .auth-hero { display: block; } }

    .auth-hero-photo {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 0;
    }

    .auth-hero-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      z-index: 1;
    }

    .auth-hero-content {
      position: absolute;
      bottom: 32px; left: 24px; right: 24px;
      z-index: 2;
      color: var(--color-white);
    }

    .hero-stars {
      display: flex;
      gap: 3px;
      color: var(--warning-500);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .hero-quote {
      font-size: var(--text-lg);
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 20px;
    }

    .hero-avatars { display: flex; align-items: center; gap: 10px; }
    .avatar-stack { display: flex; }

    .avatar-stack .av {
      width: 34px; height: 34px;
      border-radius: var(--radius-full);
      border: 2px solid var(--color-white);
      object-fit: cover;
      margin-left: -9px;
      background-color: var(--primary-300);
    }

    .avatar-stack .av:first-child { margin-left: 0; }

    .avatar-count {
      width: 34px; height: 34px;
      border-radius: var(--radius-full);
      border: 2px solid var(--color-white);
      background-color: var(--primary-700);
      color: var(--color-white);
      font-size: var(--text-xs);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -9px;
    }

    .hero-member-text { font-size: var(--text-sm); color: rgba(255,255,255,0.88); }

    /* ── Form panel ─────────────────────────────────────────── */
    .auth-form-panel {
      flex: 1;
      background-color: var(--color-white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 52px 40px;
    }

    @media (max-width: 991px) { .auth-form-panel { padding: 48px 24px; } }

    .auth-form-inner { width: 100%; max-width: 380px; }

    .auth-logo { display: block; margin-bottom: 36px; text-decoration: none; }
    .auth-logo img { height: 44px; width: auto; }

    /* Success icon */
    .success-icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      background-color: var(--success-100);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .success-icon-wrap i {
      font-size: 1.75rem;
      color: var(--success-600);
    }

    .auth-title {
      font-size: var(--text-2xl);
      font-weight: 800;
      color: var(--text-900);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .auth-subtitle {
      font-size: var(--text-sm);
      color: var(--neutral-500);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    #dashboardBtn:disabled { opacity: 0.7; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="auth-page">

    <!-- Hero -->
    <div class="auth-hero" aria-hidden="true">
      <img class="auth-hero-photo" src="../assets/images/image 55 1.png" alt="" />
      <div class="auth-hero-gradient"></div>
      <div class="auth-hero-content">
        <div class="hero-stars">
          <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i>
        </div>
        <p class="hero-quote">
          "Generosity isn't just about giving. It's about creating a world where everyone belongs"
        </p>
        <div class="hero-avatars">
          <div class="avatar-stack">
            <img class="av" src="../assets/images/Avatar.png" alt="" />
            <img class="av" src="../assets/images/Avatar (4) 1.png" alt="" />
            <div class="av" style="background-color: var(--primary-400);"></div>
            <span class="avatar-count">+2k</span>
          </div>
          <span class="hero-member-text">Join 20,000+ people in your community</span>
        </div>
      </div>
    </div>

    <!-- Success panel -->
    <div class="auth-form-panel">
      <div class="auth-form-inner">

        <a href="../index.html" class="auth-logo">
          <img src="../assets/images/logo-small.png" alt="GiveNet" />
        </a>

        <div class="success-icon-wrap">
          <i class="bi bi-check-circle-fill"></i>
        </div>

        <h1 class="auth-title">Email Verified!</h1>
        <p class="auth-subtitle">
          Your account is ready. You can now log in and start using GiveNet.
        </p>

        <button
          type="button"
          class="btn-gn-primary btn-gn-full"
          id="dashboardBtn"
          style="border-radius: var(--radius-full);"
        >
          <span id="btnText">Go to Dashboard</span>
          <span id="btnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          </span>
        </button>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { auth, db }    from '../js/firebase-config.js';
    import { requireAuth } from '../js/auth-guard.js';
    import { showToast }   from '../js/utils.js';
    import { onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    requireAuth();

    const dashboardBtn = document.getElementById('dashboardBtn');
    const btnText      = document.getElementById('btnText');
    const btnSpinner   = document.getElementById('btnSpinner');

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (user) currentUser = user;
    });

    dashboardBtn.addEventListener('click', async () => {
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }

      dashboardBtn.disabled = true;
      btnText.textContent   = 'Loading…';
      btnSpinner.classList.remove('d-none');

      try {
        const snap = await getDoc(doc(db, 'users', currentUser.uid));
        const role = snap.exists() ? snap.data().role : 'donor';

        if (role === 'admin')          window.location.href = 'admin-dashboard.html';
        else if (role === 'recipient') window.location.href = 'recipient-dashboard.html';
        else                           window.location.href = 'donor-dashboard.html';
      } catch {
        showToast('Could not load your profile. Please try signing in again.', 'error');
        dashboardBtn.disabled = false;
        btnText.textContent   = 'Go to Dashboard';
        btnSpinner.classList.add('d-none');
      }
    });
  </script>

</body>
</html>
