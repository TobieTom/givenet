<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — GiveNet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      min-height: 100vh;
      background: var(--color-white);
      color: var(--color-text);
      overflow: hidden;
    }

    /* ══════════════════════════════════════ SIDEBAR */
    .gn-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #FEFAF3;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: fixed;
      top: 0; left: 0;
      z-index: 300;
      transition: width var(--transition-slow), transform var(--transition-slow);
      overflow: hidden;
    }
    .gn-sidebar.collapsed { width: 72px; }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 16px 14px;
      flex-shrink: 0;
    }
    .sidebar-logo img { height: 36px; width: auto; display: block; }
    .sidebar-collapse-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      color: var(--neutral-400); font-size: 1rem;
      transition: background var(--transition-fast), color var(--transition-fast);
      flex-shrink: 0;
    }
    .sidebar-collapse-btn:hover { background: var(--gray-100); color: var(--text-800); }
    .gn-sidebar.collapsed .sidebar-collapse-btn i { transform: rotate(180deg); }

    .sidebar-nav { flex: 1; padding: 4px 12px; overflow-y: auto; }
    .sidebar-nav ul { list-style: none; padding: 0; margin: 0; }
    .sidebar-nav ul li { margin-bottom: 2px; }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: var(--radius-lg);
      text-decoration: none;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-600);
      transition: background var(--transition-fast), color var(--transition-fast);
      white-space: nowrap;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
    }
    .sidebar-link i { font-size: 1.05rem; flex-shrink: 0; }
    .sidebar-link:hover { background: var(--gray-100); color: var(--text-900); text-decoration: none; }
    .sidebar-link.active { background: var(--primary-800); color: var(--color-white); }
    .sidebar-link.active:hover { background: var(--primary-900); color: var(--color-white); }

    .nav-badge {
      margin-left: auto;
      background: var(--error-500);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    .gn-sidebar.collapsed .sidebar-link span,
    .gn-sidebar.collapsed .nav-badge,
    .gn-sidebar.collapsed .sidebar-logo img { opacity: 0; width: 0; overflow: hidden; }
    .gn-sidebar.collapsed .sidebar-link { justify-content: center; padding: 11px; gap: 0; }
    .gn-sidebar.collapsed .sidebar-header { justify-content: center; }
    .gn-sidebar.collapsed .sidebar-collapse-btn { margin: 0 auto; }

    .sidebar-bottom {
      padding: 12px;
      border-top: 1px solid var(--gray-200);
      flex-shrink: 0;
    }
    .sidebar-bottom-link { color: var(--neutral-500); margin-bottom: 2px; }
    .sidebar-bottom-link:hover { color: var(--text-900); background: var(--gray-100); }
    .sidebar-bottom-link.logout-link:hover { background: var(--error-50); color: var(--error-600); }

    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 299;
    }
    .sidebar-overlay.active { display: block; }

    /* ══════════════════════════════════════ MAIN */
    .gn-main {
      margin-left: 260px;
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-width: 0;
      overflow: hidden;
      transition: margin-left var(--transition-slow);
    }
    .gn-main.sidebar-collapsed { margin-left: 72px; }

    /* ── Topbar ─────────────────────────────────────────────── */
    .gn-topbar {
      height: 64px;
      background: var(--color-white);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      flex-shrink: 0;
      z-index: 200;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .hamburger-btn {
      background: none; border: none; font-size: 1.4rem;
      color: var(--text-700); cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 4px;
    }
    .topbar-greeting h1 {
      font-size: var(--text-lg); font-weight: 800;
      color: var(--text-900); line-height: 1.2;
    }
    .topbar-greeting p { font-size: var(--text-xs); color: var(--neutral-500); margin: 0; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }

    .notif-btn {
      position: relative;
      background: none; border: none; cursor: pointer;
      width: 38px; height: 38px; border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-600); font-size: 1.1rem;
      transition: background var(--transition-fast);
    }
    .notif-btn:hover { background: var(--gray-100); }
    .notif-badge {
      position: absolute; top: 4px; right: 4px;
      background: var(--error-500); color: white;
      font-size: 9px; font-weight: 700;
      min-width: 16px; height: 16px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white;
    }

    .user-chip {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 6px 10px;
      border-radius: var(--radius-lg);
      transition: background var(--transition-fast);
    }
    .user-chip:hover { background: var(--gray-100); }
    .user-chip-avatar {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      background: var(--primary-200); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: var(--text-sm); color: var(--color-primary);
      overflow: hidden;
    }
    .user-chip-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-chip-name { font-size: var(--text-sm); font-weight: 700; color: var(--text-900); display: block; line-height: 1.2; }
    .user-chip-email { font-size: 10px; color: var(--neutral-400); display: block; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }


    /* ══════════════════════════════════════ MESSAGES LAYOUT */
    .gn-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .messages-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Conversation Panel ─────────────────────────────────── */
    .conv-panel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--gray-200);
      background: var(--color-white);
      overflow: hidden;
    }

    .conv-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
      flex-shrink: 0;
    }
    .conv-panel-head h2 {
      font-size: var(--text-base);
      font-weight: 800;
      color: var(--text-900);
      margin: 0;
    }
    .unread-pill {
      background: var(--color-primary);
      color: var(--color-white);
      font-size: var(--text-xs);
      font-weight: 700;
      padding: 4px 14px;
      border-radius: var(--radius-full);
    }

    .conv-search {
      padding: 0 16px 12px;
      flex-shrink: 0;
    }
    .conv-search-wrap { position: relative; }
    .conv-search-wrap .bi-search {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--neutral-400); font-size: 0.85rem;
      pointer-events: none;
    }
    .conv-search-input {
      width: 100%;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 9px 14px 9px 36px;
      font-size: var(--text-sm);
      font-family: inherit;
      color: var(--text-700);
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .conv-search-input:focus { border-color: var(--color-primary); background: var(--color-white); }
    .conv-search-input::placeholder { color: var(--neutral-400); }

    .conv-list {
      flex: 1;
      overflow-y: auto;
    }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-track { background: transparent; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }

    .conv-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--gray-100);
      transition: background var(--transition-fast);
    }
    .conv-item:hover { background: var(--gray-50); }
    .conv-item.active { background: var(--primary-100); }

    .conv-avatar {
      width: 44px; height: 44px; border-radius: var(--radius-full);
      background: var(--primary-200);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-sm); font-weight: 700;
      color: var(--color-primary);
      flex-shrink: 0;
      overflow: hidden;
    }
    .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .conv-info { flex: 1; min-width: 0; }
    .conv-info-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .conv-name {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-time {
      font-size: 11px;
      color: var(--neutral-400);
      flex-shrink: 0;
      margin-left: 8px;
      font-weight: 500;
    }
    .conv-item-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--neutral-500);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-item-label i { font-size: 10px; flex-shrink: 0; }

    .conv-preview-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .conv-preview {
      font-size: var(--text-xs);
      color: var(--neutral-400);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .conv-item.unread .conv-preview { color: var(--text-700); font-weight: 600; }
    .conv-item.unread .conv-name { color: var(--text-900); }

    .conv-unread-dot {
      background: var(--color-primary);
      color: white;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px; height: 18px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      padding: 0 5px;
    }

    /* No-conversations empty state (left panel) */
    .conv-no-results {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    .conv-no-results i { font-size: 2.2rem; color: var(--neutral-300); margin-bottom: 14px; display: block; }
    .conv-no-results h3 { font-size: var(--text-base); font-weight: 800; color: var(--text-700); margin-bottom: 8px; }
    .conv-no-results p { font-size: var(--text-sm); color: var(--neutral-400); max-width: 220px; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-50) 50%, var(--gray-100) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-md);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel-conv { height: 74px; border-bottom: 1px solid var(--gray-100); border-radius: 0; }

    /* ── Chat Panel ─────────────────────────────────────────── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--color-white);
      min-width: 0;
    }

    /* Empty state: no conversation selected */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .chat-empty i { font-size: 2.6rem; color: var(--neutral-300); }
    .chat-empty p { font-size: var(--text-sm); color: var(--neutral-400); font-weight: 600; }

    /* Active chat window */
    .chat-window { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--gray-200);
      flex-shrink: 0;
      background: var(--color-white);
    }
    .chat-back-btn {
      background: none; border: none; cursor: pointer;
      display: none;
      padding: 4px 8px 4px 0;
      color: var(--text-600); font-size: 1.2rem;
      align-items: center;
    }
    .chat-header-avatar {
      width: 40px; height: 40px; border-radius: var(--radius-full);
      background: var(--primary-200);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-sm); font-weight: 700;
      color: var(--color-primary);
      flex-shrink: 0;
      overflow: hidden;
    }
    .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-name { font-size: var(--text-sm); font-weight: 700; color: var(--text-900); margin-bottom: 2px; }
    .chat-header-item {
      font-size: 11px; color: var(--neutral-500);
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-header-item i { font-size: 10px; flex-shrink: 0; }

    /* Messages scroll area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }

    /* Date divider */
    .msg-date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0 8px;
    }
    .msg-date-divider::before,
    .msg-date-divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--gray-200);
    }
    .msg-date-divider span {
      font-size: 11px; color: var(--neutral-400);
      font-weight: 600; white-space: nowrap;
    }

    /* Message group */
    .msg-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 8px;
    }
    .msg-group.sent { align-items: flex-end; }
    .msg-group.received { align-items: flex-start; }

    .msg-row { display: flex; width: 100%; min-width: 0; }
    .msg-row.sent { justify-content: flex-end; }
    .msg-row.received { justify-content: flex-start; }

    .msg-bubble {
      display: inline-block;
      max-width: 70%;
      min-width: 60px;
      width: auto;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: var(--text-sm);
      line-height: 1.5;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .msg-row.sent .msg-bubble {
      background: var(--color-primary);
      color: var(--color-white);
      border-bottom-right-radius: 4px;
    }
    .msg-row.received .msg-bubble {
      background: var(--gray-100);
      color: var(--text-800);
      border-bottom-left-radius: 4px;
    }
    .msg-meta {
      font-size: 10px;
      color: var(--neutral-400);
      margin-top: 4px;
      display: block;
      font-weight: 500;
    }

    /* Messages empty */
    .chat-msgs-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .chat-msgs-empty i { font-size: 2rem; color: var(--neutral-300); margin-bottom: 10px; display: block; }
    .chat-msgs-empty p { font-size: var(--text-sm); color: var(--neutral-400); font-weight: 600; }

    /* Chat input bar */
    .chat-input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--gray-200);
      flex-shrink: 0;
      background: var(--color-white);
    }
    .chat-input {
      flex: 1;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-full);
      padding: 10px 18px;
      font-size: var(--text-sm);
      font-family: inherit;
      color: var(--text-800);
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color var(--transition-fast);
    }
    .chat-input:focus { border-color: var(--color-primary); background: var(--color-white); }
    .chat-input::placeholder { color: var(--neutral-400); }
    .chat-send-btn {
      width: 42px; height: 42px; border-radius: var(--radius-full);
      background: var(--color-primary); color: white;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
      transition: background var(--transition-fast);
    }
    .chat-send-btn:hover { background: var(--primary-800); }
    .chat-send-btn:disabled { background: var(--gray-300); cursor: not-allowed; }

    /* Toast */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast-msg {
      display: flex; align-items: center; gap: 10px;
      background: var(--text-900); color: white;
      padding: 12px 18px; border-radius: var(--radius-lg);
      font-size: var(--text-sm); font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      animation: fadeInUp 0.2s ease;
      margin-top: 8px;
    }
    .toast-msg.error { background: var(--error-600); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ══════════════════════════════════════ RESPONSIVE */
    @media (max-width: 991.98px) {
      .gn-sidebar { transform: translateX(-100%); width: 260px !important; }
      .gn-sidebar.mobile-open { transform: translateX(0); }
      .gn-main { margin-left: 0 !important; }
      .gn-topbar { padding: 0 16px; }
      .user-chip-info { display: none; }

      /* On mobile: conv panel is full width */
      .conv-panel { width: 100%; border-right: none; }

      /* Chat panel slides over the full screen */
      .chat-panel {
        position: fixed;
        inset: 0;
        z-index: 150;
        transform: translateX(100%);
        transition: transform 0.25s ease;
      }
      .chat-panel.mobile-open {
        transform: translateX(0);
      }
      .chat-back-btn { display: flex; }
    }

    @media (max-width: 575.98px) {
      .topbar-greeting p { display: none; }
      .conv-panel-head { padding: 16px 16px 10px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ══════════════════════════════════════ SIDEBAR -->
  <aside class="gn-sidebar" id="sidebar">
    <div class="sidebar-header">
      <a class="sidebar-logo" href="../index.html">
        <img src="../assets/images/logo-small.png" alt="GiveNet" />
      </a>
      <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" aria-label="Collapse sidebar">
        <i class="bi bi-chevron-left"></i>
      </button>
    </div>

    <nav class="sidebar-nav" aria-label="Donor navigation">
      <ul>
        <li>
          <a href="donor-dashboard.html" class="sidebar-link">
            <i class="bi bi-grid-1x2"></i><span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="donor-post-item.html" class="sidebar-link">
            <i class="bi bi-plus-circle"></i><span>Post New Item</span>
          </a>
        </li>
        <li>
          <a href="donor-my-items.html" class="sidebar-link">
            <i class="bi bi-box-seam"></i><span>My Items</span>
          </a>
        </li>
        <li>
          <a href="donor-requests.html" class="sidebar-link">
            <i class="bi bi-inbox"></i><span>Requests Received</span>
          </a>
        </li>
        <li>
          <a href="donor-messages.html" class="sidebar-link active">
            <i class="bi bi-chat-left-text"></i><span>Messages</span>
            <span class="nav-badge d-none" id="msgBadge">0</span>
          </a>
        </li>
        <li>
          <a href="donor-ratings.html" class="sidebar-link">
            <i class="bi bi-star"></i><span>Ratings &amp; Feedback</span>
          </a>
        </li>
        <li>
          <a href="donor-profile.html" class="sidebar-link">
            <i class="bi bi-person-gear"></i><span>Profile Settings</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-bottom">
      <button class="sidebar-link sidebar-bottom-link" id="switchAccountBtn" type="button">
        <i class="bi bi-arrow-left-right"></i><span>Switch to Recipient</span>
      </button>
      <button class="sidebar-link sidebar-bottom-link logout-link" id="logoutBtn" type="button">
        <i class="bi bi-box-arrow-right"></i><span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- ══════════════════════════════════════ MAIN -->
  <div class="gn-main" id="gnMain">

    <!-- Topbar -->
    <header class="gn-topbar">
      <div class="topbar-left">
        <button class="hamburger-btn d-lg-none" id="hamburgerBtn" aria-label="Open sidebar">
          <i class="bi bi-list"></i>
        </button>
        <div class="topbar-greeting">
          <h1>Messages</h1>
          <p>Communicate with recipients about your donated items</p>
        </div>
      </div>
      <div class="topbar-right">
        <button class="notif-btn" aria-label="Notifications">
          <i class="bi bi-bell"></i>
          <span class="notif-badge d-none" id="notifBadge">0</span>
        </button>
        <div class="user-chip" id="userChip">
          <div class="user-chip-avatar" id="userAvatar">?</div>
          <div class="user-chip-info">
            <span class="user-chip-name" id="userName">—</span>
            <span class="user-chip-email" id="userEmail">—</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Messages two-panel content -->
    <main class="gn-content">
      <div class="messages-wrapper">

        <!-- ── Left: Conversation List Panel ── -->
        <div class="conv-panel" id="convPanel">

          <div class="conv-panel-head">
            <h2>Conversations</h2>
            <span class="unread-pill d-none" id="unreadPill">0 Unread</span>
          </div>

          <div class="conv-search">
            <div class="conv-search-wrap">
              <i class="bi bi-search"></i>
              <input type="text" id="convSearchInput" class="conv-search-input"
                     placeholder="Search conversations..." autocomplete="off" />
            </div>
          </div>

          <div class="conv-list" id="convList">
            <div class="skeleton skel-conv"></div>
            <div class="skeleton skel-conv"></div>
            <div class="skeleton skel-conv"></div>
            <div class="skeleton skel-conv"></div>
          </div>

        </div><!-- /conv-panel -->

        <!-- ── Right: Chat Panel ── -->
        <div class="chat-panel" id="chatPanel">

          <!-- No conversation selected -->
          <div class="chat-empty" id="chatEmpty">
            <i class="bi bi-send"></i>
            <p>Select a conversation to start messaging</p>
          </div>

          <!-- Active chat window (hidden until a conversation is opened) -->
          <div class="chat-window d-none" id="chatWindow">

            <div class="chat-header">
              <button class="chat-back-btn" id="chatBackBtn" aria-label="Back to conversations">
                <i class="bi bi-chevron-left"></i>
              </button>
              <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
              <div class="chat-header-info">
                <div class="chat-header-name" id="chatHeaderName">—</div>
                <div class="chat-header-item">
                  <i class="bi bi-box-seam"></i>
                  <span id="chatHeaderItemName">—</span>
                </div>
              </div>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-bar">
              <textarea id="chatInput" class="chat-input"
                        placeholder="Type your message..." rows="1"></textarea>
              <button class="chat-send-btn" id="chatSendBtn" aria-label="Send message">
                <i class="bi bi-send"></i>
              </button>
            </div>

          </div><!-- /chatWindow -->

        </div><!-- /chat-panel -->

      </div><!-- /messages-wrapper -->
    </main>

  </div><!-- /gn-main -->

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      collection, doc, getDoc, addDoc, updateDoc,
      query, where, orderBy, onSnapshot, serverTimestamp, increment
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ── State ──────────────────────────────────────────────────
    let currentUser    = null;
    let allConvs       = [];          // sorted conversations array
    let usersCache     = {};          // uid → Firestore user data
    let itemsCache     = {};          // itemId → Firestore item data
    let activeConvId   = null;
    let convUnsub      = null;        // onSnapshot unsubscribe for conv list
    let msgUnsub       = null;        // onSnapshot unsubscribe for messages
    let searchQuery    = '';
    const convIdParam  = new URLSearchParams(window.location.search).get('conversationId');
    let autoOpenDone   = false;

    // ── Helpers ────────────────────────────────────────────────
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showToast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `toast-msg ${type}`;
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function getInitial(name) {
      return name ? name.trim().charAt(0).toUpperCase() : '?';
    }

    /** Format timestamp for conversation list: time today, "Yesterday", weekday, or date */
    function fmtConvTime(ts) {
      if (!ts) return '';
      const d   = ts.toDate ? ts.toDate() : new Date(ts);
      const now  = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yestStart  = new Date(todayStart); yestStart.setDate(yestStart.getDate() - 1);
      const msgDay     = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      if (msgDay >= todayStart) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      if (msgDay >= yestStart)  return 'Yesterday';
      const diffDays = (todayStart - msgDay) / 86400000;
      if (diffDays < 7) return d.toLocaleDateString('en-US', { weekday: 'short' });
      return d.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' });
    }

    /** Format timestamp for message timestamps */
    function fmtMsgTime(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    /** Format date for date dividers */
    function fmtMsgDate(ts) {
      if (!ts) return '';
      const d  = ts.toDate ? ts.toDate() : new Date(ts);
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yestStart  = new Date(todayStart); yestStart.setDate(yestStart.getDate() - 1);
      const msgDay     = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      if (msgDay >= todayStart) return 'Today';
      if (msgDay >= yestStart)  return 'Yesterday';
      return d.toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    // ── Auth Guard ─────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) { window.location.href = 'login.html'; return; }
        const data = snap.data();
        if (data.role === 'admin')          { window.location.href = 'admin-dashboard.html'; return; }
        if (data.role === 'recipient')      { window.location.href = 'recipient-dashboard.html'; return; }
        currentUser = user;
        initTopbar(user, data);
        initConversationsListener();
      } catch (err) {
        console.error('Auth error:', err);
        window.location.href = 'login.html';
      }
    });

    // ── Topbar ─────────────────────────────────────────────────
    function initTopbar(user, data) {
      const name = data.fullName || data.displayName || data.name || user.displayName || 'User';
      document.getElementById('userName').textContent  = name;
      document.getElementById('userEmail').textContent = user.email || '';
      const av = document.getElementById('userAvatar');
      const photo = data.photoURL || user.photoURL;
      if (photo) {
        av.innerHTML = `<img src="${escapeHtml(photo)}" alt="${escapeHtml(name)}" />`;
      } else {
        av.textContent = getInitial(name);
      }
    }

    // ── Conversations Listener ─────────────────────────────────
    function initConversationsListener() {
      const q = query(
        collection(db, 'conversations'),
        where('participantIds', 'array-contains', currentUser.uid)
      );

      convUnsub = onSnapshot(q, async (snapshot) => {
        allConvs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

        // Sort by lastMessageTime desc (client-side to avoid composite index)
        allConvs.sort((a, b) => {
          const ta = a.lastMessageTime?.toMillis?.() || 0;
          const tb = b.lastMessageTime?.toMillis?.() || 0;
          return tb - ta;
        });

        // Batch-fetch missing user/item data
        const missingUids  = [];
        const missingItems = [];
        for (const conv of allConvs) {
          const otherId = (conv.participantIds || []).find(id => id !== currentUser.uid);
          if (otherId && !usersCache[otherId]) missingUids.push(otherId);
          if (conv.itemId && !itemsCache[conv.itemId]) missingItems.push(conv.itemId);
        }

        await Promise.all([
          ...missingUids.map(async uid => {
            try {
              const s = await getDoc(doc(db, 'users', uid));
              if (s.exists()) usersCache[uid] = s.data();
            } catch {}
          }),
          ...missingItems.map(async id => {
            try {
              const s = await getDoc(doc(db, 'items', id));
              if (s.exists()) itemsCache[id] = s.data();
            } catch {}
          }),
        ]);

        renderConvList();
        updateUnreadBadge();
        if (!autoOpenDone && convIdParam && allConvs.some(c => c.id === convIdParam)) {
          autoOpenDone = true;
          selectConversation(convIdParam);
        }
      }, err => {
        console.error('Conversations listener error:', err);
      });
    }

    // ── Render Conversation List ───────────────────────────────
    function renderConvList() {
      const list = document.getElementById('convList');
      list.querySelectorAll('.skeleton').forEach(el => el.remove());

      const q  = searchQuery.toLowerCase();
      const filtered = q
        ? allConvs.filter(conv => {
            const otherId   = (conv.participantIds || []).find(id => id !== currentUser.uid);
            const otherUser = otherId ? usersCache[otherId] : null;
            const name      = otherUser?.displayName || otherUser?.name || '';
            const item      = conv.itemId ? itemsCache[conv.itemId] : null;
            const itemName  = item?.title || item?.itemName || '';
            return name.toLowerCase().includes(q)
                || itemName.toLowerCase().includes(q)
                || (conv.lastMessage || '').toLowerCase().includes(q);
          })
        : allConvs;

      if (allConvs.length === 0) {
        list.innerHTML = `
          <div class="conv-no-results">
            <i class="bi bi-chat-square"></i>
            <h3>No conversations yet.</h3>
            <p>Messages from recipients will appear here once someone requests one of your items.</p>
          </div>`;
        return;
      }

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="conv-no-results">
            <i class="bi bi-search"></i>
            <h3>No results</h3>
            <p>Try a different search term.</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(conv => {
        const otherId   = (conv.participantIds || []).find(id => id !== currentUser.uid);
        const otherUser = otherId ? usersCache[otherId] : null;
        const name      = otherUser?.fullName || otherUser?.displayName || otherUser?.name || 'Unknown User';
        const photo     = otherUser?.photoURL || '';
        const item      = conv.itemId ? itemsCache[conv.itemId] : null;
        const itemName  = item?.title || item?.itemName || 'Unknown Item';
        const lastMsg   = conv.lastMessage || 'No messages yet';
        const timeStr   = fmtConvTime(conv.lastMessageTime);
        const unread    = (conv.unreadCounts || {})[currentUser.uid] || 0;
        const isActive  = conv.id === activeConvId;

        const avatarInner = photo
          ? `<img src="${escapeHtml(photo)}" alt="${escapeHtml(name)}" />`
          : escapeHtml(getInitial(name));

        return `
          <div class="conv-item${unread > 0 ? ' unread' : ''}${isActive ? ' active' : ''}"
               data-conv-id="${escapeHtml(conv.id)}"
               role="button" tabindex="0"
               onclick="selectConversation('${escapeHtml(conv.id)}')"
               onkeydown="if(event.key==='Enter')selectConversation('${escapeHtml(conv.id)}')">
            <div class="conv-avatar">${avatarInner}</div>
            <div class="conv-info">
              <div class="conv-info-top">
                <span class="conv-name">${escapeHtml(name)}</span>
                <span class="conv-time">${escapeHtml(timeStr)}</span>
              </div>
              <div class="conv-item-label">
                <i class="bi bi-box-seam"></i>
                <span>${escapeHtml(itemName)}</span>
              </div>
              <div class="conv-preview-row">
                <span class="conv-preview">${escapeHtml(lastMsg)}</span>
                ${unread > 0 ? `<span class="conv-unread-dot">${unread > 99 ? '99+' : unread}</span>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Update unread badges (sidebar + top-of-list pill) ──────
    function updateUnreadBadge() {
      let total = 0;
      for (const conv of allConvs) {
        total += (conv.unreadCounts || {})[currentUser.uid] || 0;
      }
      const pill     = document.getElementById('unreadPill');
      const navBadge = document.getElementById('msgBadge');
      if (total > 0) {
        const label = total > 99 ? '99+' : total;
        pill.textContent = `${label} Unread`;
        pill.classList.remove('d-none');
        navBadge.textContent = label;
        navBadge.classList.remove('d-none');
      } else {
        pill.classList.add('d-none');
        navBadge.classList.add('d-none');
      }
    }

    // ── Open / select a conversation ───────────────────────────
    window.selectConversation = async function(convId) {
      if (activeConvId === convId) return;
      activeConvId = convId;

      // Update active highlight in list
      document.querySelectorAll('.conv-item').forEach(el => {
        el.classList.toggle('active', el.dataset.convId === convId);
      });

      const conv = allConvs.find(c => c.id === convId);
      if (!conv) return;

      const otherId   = (conv.participantIds || []).find(id => id !== currentUser.uid);
      let otherUser   = otherId ? usersCache[otherId] : null;
      if (otherId && !otherUser) {
        try {
          const s = await getDoc(doc(db, 'users', otherId));
          if (s.exists()) { otherUser = s.data(); usersCache[otherId] = otherUser; }
        } catch {}
      }
      const name      = otherUser?.fullName || otherUser?.displayName || otherUser?.name || otherUser?.email || 'Unknown User';
      const photo     = otherUser?.photoURL || '';
      const item      = conv.itemId ? itemsCache[conv.itemId] : null;
      const itemName  = item?.title || item?.itemName || 'Unknown Item';

      // Populate chat header
      const headerAv = document.getElementById('chatHeaderAvatar');
      if (photo) {
        headerAv.innerHTML = `<img src="${escapeHtml(photo)}" alt="${escapeHtml(name)}" />`;
      } else {
        headerAv.textContent = getInitial(name);
      }
      document.getElementById('chatHeaderName').textContent     = name;
      document.getElementById('chatHeaderItemName').textContent = itemName;

      // Show chat window, hide empty state
      document.getElementById('chatEmpty').classList.add('d-none');
      document.getElementById('chatWindow').classList.remove('d-none');

      // Mobile: slide chat panel in
      document.getElementById('chatPanel').classList.add('mobile-open');

      // Mark as read
      markAsRead(convId);

      // Start real-time messages listener
      startMessagesListener(convId);
    };

    // ── Mark conversation as read ──────────────────────────────
    async function markAsRead(convId) {
      try {
        await updateDoc(doc(db, 'conversations', convId), {
          [`unreadCounts.${currentUser.uid}`]: 0
        });
      } catch {}
    }

    // ── Real-time messages listener ────────────────────────────
    function startMessagesListener(convId) {
      if (msgUnsub) { msgUnsub(); msgUnsub = null; }

      const container = document.getElementById('chatMessages');
      container.innerHTML = `
        <div class="skeleton" style="height:44px;width:60%;border-radius:18px;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:44px;width:55%;border-radius:18px;margin-bottom:8px;margin-left:auto;"></div>
        <div class="skeleton" style="height:44px;width:65%;border-radius:18px;"></div>`;

      const q = query(
        collection(db, 'conversations', convId, 'messages'),
        orderBy('timestamp', 'asc')
      );

      msgUnsub = onSnapshot(q, snapshot => {
        const messages = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderMessages(messages);
      }, err => {
        console.error('Messages listener error:', err);
        container.innerHTML = `
          <div class="chat-msgs-empty">
            <i class="bi bi-exclamation-circle"></i>
            <p>Failed to load messages.</p>
          </div>`;
      });
    }

    // ── Render messages ────────────────────────────────────────
    function renderMessages(messages) {
      const container = document.getElementById('chatMessages');

      if (!messages.length) {
        container.innerHTML = `
          <div class="chat-msgs-empty">
            <i class="bi bi-chat-dots"></i>
            <p>No messages yet. Say hello!</p>
          </div>`;
        return;
      }

      let html        = '';
      let lastDateStr = '';

      for (const msg of messages) {
        const isSent  = msg.senderId === currentUser.uid;
        const dateStr = fmtMsgDate(msg.timestamp);
        const timeStr = fmtMsgTime(msg.timestamp);

        if (dateStr !== lastDateStr) {
          html += `
            <div class="msg-date-divider">
              <span>${escapeHtml(dateStr || '…')}</span>
            </div>`;
          lastDateStr = dateStr;
        }

        html += `
          <div class="msg-group ${isSent ? 'sent' : 'received'}">
            <div class="msg-row ${isSent ? 'sent' : 'received'}">
              <div class="msg-bubble">${escapeHtml(msg.text || '')}</div>
            </div>
            <span class="msg-meta">${escapeHtml(timeStr)}</span>
          </div>`;
      }

      container.innerHTML = html;
      // Scroll to latest message
      container.scrollTop = container.scrollHeight;
    }

    // ── Send message ───────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text  = input.value.trim();
      if (!text || !activeConvId) return;

      const btn = document.getElementById('chatSendBtn');
      btn.disabled = true;
      input.value  = '';
      autoResize(input);

      try {
        const conv    = allConvs.find(c => c.id === activeConvId);
        const otherId = conv ? (conv.participantIds || []).find(id => id !== currentUser.uid) : null;

        // Write message to subcollection
        await addDoc(collection(db, 'conversations', activeConvId, 'messages'), {
          senderId:  currentUser.uid,
          text,
          timestamp: serverTimestamp(),
          read:      false,
        });

        // Update conversation metadata
        const updates = {
          lastMessage:     text,
          lastMessageTime: serverTimestamp(),
        };
        if (otherId) updates[`unreadCounts.${otherId}`] = increment(1);
        await updateDoc(doc(db, 'conversations', activeConvId), updates);
      } catch (err) {
        console.error('Send error:', err);
        showToast('Failed to send message.', 'error');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // ── Auto-resize textarea ───────────────────────────────────
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── Input events ───────────────────────────────────────────
    document.getElementById('chatSendBtn').addEventListener('click', sendMessage);

    document.getElementById('chatInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById('chatInput').addEventListener('input', e => autoResize(e.target));

    document.getElementById('convSearchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderConvList();
    });

    // ── Mobile: back button ────────────────────────────────────
    document.getElementById('chatBackBtn').addEventListener('click', () => {
      document.getElementById('chatPanel').classList.remove('mobile-open');
      activeConvId = null;
      document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
      if (msgUnsub) { msgUnsub(); msgUnsub = null; }
      document.getElementById('chatEmpty').classList.remove('d-none');
      document.getElementById('chatWindow').classList.add('d-none');
    });

    // ── Sidebar collapse ───────────────────────────────────────
    document.getElementById('sidebarCollapseBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('gnMain').classList.toggle('sidebar-collapsed');
    });

    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.add('mobile-open');
      document.getElementById('sidebarOverlay').classList.add('active');
    });

    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('sidebarOverlay').classList.remove('active');
    });

    // ── Switch account ─────────────────────────────────────────
    document.getElementById('switchAccountBtn').addEventListener('click', async () => {
      if (!currentUser) return;
      try {
        await updateDoc(doc(db, 'users', currentUser.uid), { role: 'recipient' });
        window.location.href = 'recipient-dashboard.html';
      } catch {
        showToast('Failed to switch account.', 'error');
      }
    });

    // ── Logout ─────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.href = 'login.html';
      } catch {
        showToast('Logout failed.', 'error');
      }
    });

  </script>
</body>
</html>
