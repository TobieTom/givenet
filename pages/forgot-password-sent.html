<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Your Email — GiveNet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    body {
      background-color: var(--color-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    .auth-page {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    @media (min-width: 992px) {
      body { padding: var(--spacing-lg); align-items: stretch; }
      .auth-page {
        max-width: 980px;
        margin: auto;
        border-radius: var(--radius-xl);
        overflow: hidden;
        box-shadow: var(--shadow-xl);
        min-height: 600px;
      }
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .auth-hero {
      display: none;
      flex: 0 0 45%;
      position: relative;
      overflow: hidden;
      height: 100vh;
    }

    @media (min-width: 992px) { .auth-hero { display: block; } }

    .auth-hero-photo {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 0;
    }

    .auth-hero-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      z-index: 1;
    }

    .auth-hero-content {
      position: absolute;
      bottom: 32px; left: 24px; right: 24px;
      z-index: 2;
      color: var(--color-white);
    }

    .hero-stars {
      display: flex;
      gap: 3px;
      color: var(--warning-500);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .hero-quote {
      font-size: var(--text-lg);
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 20px;
    }

    .hero-avatars { display: flex; align-items: center; gap: 10px; }
    .avatar-stack { display: flex; }

    .avatar-stack .av {
      width: 34px; height: 34px;
      border-radius: var(--radius-full);
      border: 2px solid var(--color-white);
      object-fit: cover;
      margin-left: -9px;
      background-color: var(--primary-300);
    }

    .avatar-stack .av:first-child { margin-left: 0; }

    .avatar-count {
      width: 34px; height: 34px;
      border-radius: var(--radius-full);
      border: 2px solid var(--color-white);
      background-color: var(--primary-700);
      color: var(--color-white);
      font-size: var(--text-xs);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -9px;
    }

    .hero-member-text { font-size: var(--text-sm); color: rgba(255,255,255,0.88); }

    /* ── Form panel ─────────────────────────────────────────── */
    .auth-form-panel {
      flex: 1;
      background-color: var(--color-white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 52px 40px;
    }

    @media (max-width: 991px) { .auth-form-panel { padding: 48px 24px; } }

    .auth-form-inner { width: 100%; max-width: 380px; }

    .auth-logo { display: block; margin-bottom: 36px; text-decoration: none; }
    .auth-logo img { height: 44px; width: auto; }

    /* Email icon */
    .email-icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      background-color: var(--primary-100);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .email-icon-wrap i {
      font-size: 1.75rem;
      color: var(--color-primary);
    }

    .auth-title {
      font-size: var(--text-2xl);
      font-weight: 800;
      color: var(--text-900);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .auth-subtitle {
      font-size: var(--text-sm);
      color: var(--neutral-500);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .auth-subtitle .sent-email {
      color: var(--color-primary);
      font-weight: 700;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--neutral-500);
      text-decoration: none;
      margin-top: 16px;
      justify-content: center;
      transition: color var(--transition-base);
    }

    .back-link:hover { color: var(--color-primary); text-decoration: none; }

    .resend-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: var(--text-sm);
      color: var(--neutral-400);
    }

    .resend-link button {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: inherit;
      font-weight: 700;
      color: var(--color-primary);
      cursor: pointer;
      text-decoration: none;
    }

    .resend-link button:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="auth-page">

    <!-- Hero -->
    <div class="auth-hero" aria-hidden="true">
      <img class="auth-hero-photo" src="../assets/images/image 55 1.png" alt="" />
      <div class="auth-hero-gradient"></div>
      <div class="auth-hero-content">
        <div class="hero-stars">
          <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i>
          <i class="bi bi-star-fill"></i>
        </div>
        <p class="hero-quote">
          "Generosity isn't just about giving. It's about creating a world where everyone belongs"
        </p>
        <div class="hero-avatars">
          <div class="avatar-stack">
            <img class="av" src="../assets/images/Avatar.png" alt="" />
            <img class="av" src="../assets/images/Avatar (4) 1.png" alt="" />
            <div class="av" style="background-color: var(--primary-400);"></div>
            <span class="avatar-count">+2k</span>
          </div>
          <span class="hero-member-text">Join 20,000+ people in your community</span>
        </div>
      </div>
    </div>

    <!-- Confirmation panel -->
    <div class="auth-form-panel">
      <div class="auth-form-inner">

        <a href="../index.html" class="auth-logo">
          <img src="../assets/images/logo-small.png" alt="GiveNet" />
        </a>

        <div class="email-icon-wrap">
          <i class="bi bi-envelope-check"></i>
        </div>

        <h1 class="auth-title">Check your Email</h1>
        <p class="auth-subtitle">
          We sent a password reset link to<br />
          <span class="sent-email" id="sentEmail"></span>
        </p>

        <a
          href="login.html"
          class="btn-gn-primary btn-gn-full"
          style="border-radius: var(--radius-full);"
        >
          Back to Sign In
        </a>

        <p class="resend-link">
          Didn't receive it?
          <button type="button" id="resendBtn">Resend</button>
        </p>

        <a href="login.html" class="back-link">
          <i class="bi bi-arrow-left"></i> Back to login
        </a>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { auth }         from '../js/firebase-config.js';
    import { requireGuest } from '../js/auth-guard.js';
    import { showToast }    from '../js/utils.js';
    import { sendPasswordResetEmail }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    requireGuest();

    // Display the email address stored by the previous page
    const email = sessionStorage.getItem('resetEmail') || '';
    document.getElementById('sentEmail').textContent = email;

    // Resend
    document.getElementById('resendBtn').addEventListener('click', async () => {
      if (!email) {
        showToast('No email address found. Please start again.', 'error');
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        showToast('Reset link resent successfully.', 'success');
      } catch {
        showToast('Could not resend. Please try again.', 'error');
      }
    });
  </script>

</body>
</html>
