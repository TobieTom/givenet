<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ratings &amp; Feedback — GiveNet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      min-height: 100vh;
      background: var(--color-white);
      color: var(--color-text);
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════ SIDEBAR */
    .gn-sidebar {
      width: 260px; flex-shrink: 0;
      background: #FEFAF3;
      display: flex; flex-direction: column;
      height: 100vh; position: fixed; top: 0; left: 0;
      z-index: 300;
      transition: width var(--transition-slow), transform var(--transition-slow);
      overflow: hidden;
    }
    .gn-sidebar.collapsed { width: 72px; }
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 16px 14px; flex-shrink: 0;
    }
    .sidebar-logo img { height: 36px; width: auto; display: block; }
    .sidebar-collapse-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      color: var(--neutral-400); font-size: 1rem;
      transition: background var(--transition-fast), color var(--transition-fast);
      flex-shrink: 0;
    }
    .sidebar-collapse-btn:hover { background: var(--gray-100); color: var(--text-800); }
    .gn-sidebar.collapsed .sidebar-collapse-btn i { transform: rotate(180deg); }
    .sidebar-nav { flex: 1; padding: 4px 12px; overflow-y: auto; }
    .sidebar-nav ul { list-style: none; }
    .sidebar-nav ul li { margin-bottom: 2px; }
    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: var(--radius-lg);
      text-decoration: none; font-size: var(--text-sm); font-weight: 600;
      color: var(--text-600);
      transition: background var(--transition-fast), color var(--transition-fast);
      white-space: nowrap; width: 100%; background: none; border: none;
      cursor: pointer; font-family: inherit; text-align: left;
    }
    .sidebar-link i { font-size: 1.05rem; flex-shrink: 0; }
    .sidebar-link:hover { background: var(--gray-100); color: var(--text-900); text-decoration: none; }
    .sidebar-link.active { background: var(--primary-800); color: var(--color-white); }
    .sidebar-link.active:hover { background: var(--primary-900); color: var(--color-white); }
    .nav-badge {
      margin-left: auto; background: var(--error-500); color: white;
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: var(--radius-full); flex-shrink: 0;
    }
    .gn-sidebar.collapsed .sidebar-link span,
    .gn-sidebar.collapsed .nav-badge,
    .gn-sidebar.collapsed .sidebar-logo img { opacity: 0; width: 0; overflow: hidden; }
    .gn-sidebar.collapsed .sidebar-link { justify-content: center; padding: 11px; gap: 0; }
    .gn-sidebar.collapsed .sidebar-header { justify-content: center; }
    .gn-sidebar.collapsed .sidebar-collapse-btn { margin: 0 auto; }
    .sidebar-bottom { padding: 12px; border-top: 1px solid var(--gray-200); flex-shrink: 0; }
    .sidebar-bottom-link { color: var(--neutral-500); margin-bottom: 2px; }
    .sidebar-bottom-link:hover { color: var(--text-900); background: var(--gray-100); }
    .sidebar-bottom-link.logout-link:hover { background: var(--error-50); color: var(--error-600); }
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 299;
    }
    .sidebar-overlay.active { display: block; }

    /* ══════════════════════════════════════ MAIN */
    .gn-main {
      margin-left: 260px; flex: 1;
      display: flex; flex-direction: column;
      min-height: 100vh; min-width: 0;
      transition: margin-left var(--transition-slow);
    }
    .gn-main.sidebar-collapsed { margin-left: 72px; }

    /* ── Topbar ─────────────────────────────────────────────── */
    .gn-topbar {
      height: 64px; background: var(--color-white);
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; flex-shrink: 0;
      position: sticky; top: 0; z-index: 200;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .hamburger-btn {
      background: none; border: none; font-size: 1.4rem;
      color: var(--text-700); cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 4px;
    }
    .topbar-greeting h1 { font-size: var(--text-lg); font-weight: 800; color: var(--text-900); line-height: 1.2; }
    .topbar-greeting p  { font-size: var(--text-xs); color: var(--neutral-500); margin: 0; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .notif-btn {
      position: relative; background: none; border: none; cursor: pointer;
      width: 38px; height: 38px; border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-600); font-size: 1.1rem;
      transition: background var(--transition-fast);
    }
    .notif-btn:hover { background: var(--gray-100); }
    .notif-badge {
      position: absolute; top: 4px; right: 4px;
      background: var(--error-500); color: white;
      font-size: 9px; font-weight: 700; min-width: 16px; height: 16px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white;
    }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 6px 10px; border-radius: var(--radius-lg);
      transition: background var(--transition-fast);
    }
    .user-chip:hover { background: var(--gray-100); }
    .user-chip-avatar {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      background: var(--primary-200); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: var(--text-sm); color: var(--color-primary);
      overflow: hidden;
    }
    .user-chip-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-chip-name  { font-size: var(--text-sm); font-weight: 700; color: var(--text-900); display: block; line-height: 1.2; }
    .user-chip-email { font-size: 10px; color: var(--neutral-400); display: block; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }


    /* ── Content ────────────────────────────────────────────── */
    .gn-content { padding: 28px; flex: 1; background: var(--color-white); }

    /* ── Summary cards ──────────────────────────────────────── */
    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    .summary-card {
      background: var(--color-white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
    }
    .summary-icon-wrap {
      width: 48px; height: 48px; border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: 16px;
    }
    .summary-icon-wrap.amber { background: var(--warning-100); color: var(--warning-600); }
    .summary-icon-wrap.green { background: var(--success-100); color: var(--success-700); }
    .summary-value {
      font-size: 2rem; font-weight: 800; color: var(--text-900);
      line-height: 1; margin-bottom: 4px;
    }
    .summary-label {
      font-size: var(--text-xs); color: var(--neutral-500);
      font-weight: 600; margin-bottom: 12px;
    }
    .summary-stars { display: flex; gap: 3px; }
    .summary-stars i { font-size: 1rem; color: var(--warning-500); }
    .summary-stars i.empty { color: var(--gray-300); }

    /* ── Reviews section ────────────────────────────────────── */
    .section-title {
      font-size: var(--text-base); font-weight: 800;
      color: var(--text-900); margin-bottom: 0;
    }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .reviews-count {
      font-size: var(--text-xs); font-weight: 600; color: var(--neutral-500);
    }

    .review-card {
      background: var(--color-white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      margin-bottom: 12px;
    }
    .review-stars { display: flex; gap: 3px; margin-bottom: 10px; }
    .review-stars i { font-size: 0.95rem; color: var(--warning-500); }
    .review-stars i.empty { color: var(--gray-300); }

    .review-comment {
      font-size: var(--text-sm); color: var(--text-700);
      line-height: 1.6; margin-bottom: 14px;
      font-style: italic;
    }

    .review-meta {
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .review-avatar {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      background: var(--primary-200); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-xs); font-weight: 700; color: var(--color-primary);
      overflow: hidden;
    }
    .review-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .review-author { font-size: var(--text-sm); font-weight: 700; color: var(--text-900); }
    .review-date   { font-size: var(--text-xs); color: var(--neutral-400); font-weight: 500; }
    .review-item-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: var(--text-xs); font-weight: 600;
      color: var(--color-primary); text-decoration: none;
    }
    .review-item-link:hover { text-decoration: underline; color: var(--primary-800); }
    .review-item-link i { font-size: 10px; }
    .review-dot { color: var(--neutral-300); font-size: 0.6rem; }

    /* ── Skeleton ───────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-50) 50%, var(--gray-100) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-md);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel-summary { height: 130px; border-radius: var(--radius-lg); border: 1px solid var(--gray-100); }
    .skel-review  { height: 110px; border-radius: var(--radius-lg); margin-bottom: 12px; }

    /* ── Empty state ────────────────────────────────────────── */
    .ratings-empty {
      background: var(--color-white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px; text-align: center;
      min-height: 320px;
    }
    .ratings-empty i { font-size: 2.6rem; color: var(--warning-400); margin-bottom: 16px; display: block; }
    .ratings-empty h3 { font-size: var(--text-lg); font-weight: 800; color: var(--text-900); margin-bottom: 10px; }
    .ratings-empty p  { font-size: var(--text-sm); color: var(--neutral-400); max-width: 380px; }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
    .toast-msg {
      display: flex; align-items: center; gap: 10px;
      background: var(--text-900); color: white;
      padding: 12px 18px; border-radius: var(--radius-lg);
      font-size: var(--text-sm); font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      animation: fadeInUp 0.2s ease; margin-top: 8px;
    }
    .toast-msg.error { background: var(--error-600); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ══════════════════════════════════════ RESPONSIVE */
    @media (max-width: 991.98px) {
      .gn-sidebar { transform: translateX(-100%); width: 260px !important; }
      .gn-sidebar.mobile-open { transform: translateX(0); }
      .gn-main { margin-left: 0 !important; }
      .gn-topbar { padding: 0 16px; }
      .gn-content { padding: 20px 16px; }
      .user-chip-info { display: none; }
      .summary-row { grid-template-columns: 1fr; gap: 12px; }
    }
    @media (max-width: 575.98px) {
      .topbar-greeting p { display: none; }
      .summary-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ══════════════════════════════════════ SIDEBAR -->
  <aside class="gn-sidebar" id="sidebar">
    <div class="sidebar-header">
      <a class="sidebar-logo" href="../index.html">
        <img src="../assets/images/logo-small.png" alt="GiveNet" />
      </a>
      <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" aria-label="Collapse sidebar">
        <i class="bi bi-chevron-left"></i>
      </button>
    </div>

    <nav class="sidebar-nav" aria-label="Donor navigation">
      <ul>
        <li>
          <a href="donor-dashboard.html" class="sidebar-link">
            <i class="bi bi-grid-1x2"></i><span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="donor-post-item.html" class="sidebar-link">
            <i class="bi bi-plus-circle"></i><span>Post New Item</span>
          </a>
        </li>
        <li>
          <a href="donor-my-items.html" class="sidebar-link">
            <i class="bi bi-box-seam"></i><span>My Items</span>
          </a>
        </li>
        <li>
          <a href="donor-requests.html" class="sidebar-link">
            <i class="bi bi-inbox"></i><span>Requests Received</span>
          </a>
        </li>
        <li>
          <a href="donor-messages.html" class="sidebar-link">
            <i class="bi bi-chat-left-text"></i><span>Messages</span>
            <span class="nav-badge d-none" id="msgBadge">0</span>
          </a>
        </li>
        <li>
          <a href="donor-ratings.html" class="sidebar-link active">
            <i class="bi bi-star"></i><span>Ratings &amp; Feedback</span>
          </a>
        </li>
        <li>
          <a href="donor-profile.html" class="sidebar-link">
            <i class="bi bi-person-gear"></i><span>Profile Settings</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-bottom">
      <button class="sidebar-link sidebar-bottom-link" id="switchAccountBtn" type="button">
        <i class="bi bi-arrow-left-right"></i><span>Switch to Recipient</span>
      </button>
      <button class="sidebar-link sidebar-bottom-link logout-link" id="logoutBtn" type="button">
        <i class="bi bi-box-arrow-right"></i><span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- ══════════════════════════════════════ MAIN -->
  <div class="gn-main" id="gnMain">

    <!-- Topbar -->
    <header class="gn-topbar">
      <div class="topbar-left">
        <button class="hamburger-btn d-lg-none" id="hamburgerBtn" aria-label="Open sidebar">
          <i class="bi bi-list"></i>
        </button>
        <div class="topbar-greeting">
          <h1>Ratings &amp; Feedback</h1>
          <p>See what recipients are saying about your donations</p>
        </div>
      </div>
      <div class="topbar-right">
        <button class="notif-btn" aria-label="Notifications">
          <i class="bi bi-bell"></i>
          <span class="notif-badge d-none" id="notifBadge">0</span>
        </button>
        <div class="user-chip" id="userChip">
          <div class="user-chip-avatar" id="userAvatar">?</div>
          <div class="user-chip-info">
            <span class="user-chip-name"  id="userName">—</span>
            <span class="user-chip-email" id="userEmail">—</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="gn-content">

      <!-- Summary row -->
      <div class="summary-row" id="summaryRow">
        <div class="skeleton skel-summary"></div>
        <div class="skeleton skel-summary"></div>
      </div>

      <!-- Reviews section -->
      <div id="reviewsSection">
        <div class="section-head">
          <h2 class="section-title">Recent Reviews</h2>
          <span class="reviews-count d-none" id="reviewsCount"></span>
        </div>
        <div id="reviewsList">
          <div class="skeleton skel-review"></div>
          <div class="skeleton skel-review"></div>
          <div class="skeleton skel-review"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      collection, doc, getDoc, getDocs,
      query, where, updateDoc
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ── State ──────────────────────────────────────────────────
    let currentUser = null;

    // ── Helpers ────────────────────────────────────────────────
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showToast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `toast-msg ${type}`;
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function getInitial(name) {
      return name ? name.trim().charAt(0).toUpperCase() : '?';
    }

    function fmtDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    /** Render N filled stars + (5-N) empty stars */
    function renderStars(rating, containerClass) {
      const n = Math.round(Math.max(0, Math.min(5, rating || 0)));
      let html = '';
      for (let i = 1; i <= 5; i++) {
        html += i <= n
          ? '<i class="bi bi-star-fill"></i>'
          : '<i class="bi bi-star-fill empty"></i>';
      }
      return `<div class="${containerClass}">${html}</div>`;
    }

    // ── Auth Guard ─────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) { window.location.href = 'login.html'; return; }
        const data = snap.data();
        if (data.role === 'admin')     { window.location.href = 'admin-dashboard.html'; return; }
        if (data.role === 'recipient') { window.location.href = 'recipient-dashboard.html'; return; }
        currentUser = user;
        initTopbar(user, data);
        await loadRatings(user.uid);
      } catch (err) {
        console.error('Auth error:', err);
        window.location.href = 'login.html';
      }
    });

    // ── Topbar ─────────────────────────────────────────────────
    function initTopbar(user, data) {
      const name  = data.fullName || data.displayName || data.name || user.displayName || 'User';
      const parts = name.trim().split(/\s+/);
      const short = parts.length > 1 ? `${parts[0]} ${parts[parts.length-1][0]}.` : parts[0];
      document.getElementById('userName').textContent  = short;
      document.getElementById('userEmail').textContent = user.email || '';
      const av    = document.getElementById('userAvatar');
      const photo = data.photoURL || user.photoURL;
      if (photo) {
        av.innerHTML = `<img src="${escapeHtml(photo)}" alt="${escapeHtml(name)}" />`;
      } else {
        av.textContent = getInitial(name);
      }
    }

    // ── Load Ratings ───────────────────────────────────────────
    async function loadRatings(uid) {
      try {
        // Query feedback directed at this donor
        const q    = query(collection(db, 'feedback'), where('toUserId', '==', uid));
        const snap = await getDocs(q);

        let allFeedback = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Sort by createdAt desc (client-side — avoids composite index)
        allFeedback.sort((a, b) => {
          const ta = a.createdAt?.toMillis?.() || 0;
          const tb = b.createdAt?.toMillis?.() || 0;
          return tb - ta;
        });

        const total = allFeedback.length;

        if (total === 0) {
          renderSummaryEmpty();
          renderEmpty();
          return;
        }

        // Compute average
        const sum = allFeedback.reduce((acc, f) => acc + (f.rating || 0), 0);
        const avg = sum / total;

        // Batch-fetch reviewer users and items
        const reviewerIds = [...new Set(allFeedback.map(f => f.fromUserId).filter(Boolean))];
        const itemIds     = [...new Set(allFeedback.map(f => f.itemId).filter(Boolean))];

        const usersMap = {};
        const itemsMap = {};

        await Promise.all([
          ...reviewerIds.map(async id => {
            try {
              const s = await getDoc(doc(db, 'users', id));
              if (s.exists()) usersMap[id] = s.data();
            } catch {}
          }),
          ...itemIds.map(async id => {
            try {
              const s = await getDoc(doc(db, 'items', id));
              if (s.exists()) itemsMap[id] = s.data();
            } catch {}
          }),
        ]);

        renderSummary(avg, total);
        renderReviews(allFeedback, usersMap, itemsMap);

      } catch (err) {
        console.error('Load ratings error:', err);
        showToast('Failed to load ratings.', 'error');
        renderSummaryEmpty();
        renderEmpty();
      }
    }

    // ── Render summary cards ───────────────────────────────────
    function renderSummary(avg, total) {
      const avgFixed = avg.toFixed(1);
      document.getElementById('summaryRow').innerHTML = `
        <div class="summary-card">
          <div class="summary-icon-wrap amber">
            <i class="bi bi-star-fill"></i>
          </div>
          <div class="summary-value">${escapeHtml(avgFixed)}</div>
          <div class="summary-label">${total} review${total !== 1 ? 's' : ''}</div>
          ${renderStars(Math.round(avg), 'summary-stars')}
        </div>
        <div class="summary-card">
          <div class="summary-icon-wrap green">
            <i class="bi bi-chat-square-text"></i>
          </div>
          <div class="summary-value">${total}</div>
          <div class="summary-label">Total reviews</div>
        </div>`;
    }

    function renderSummaryEmpty() {
      document.getElementById('summaryRow').innerHTML = `
        <div class="summary-card">
          <div class="summary-icon-wrap amber">
            <i class="bi bi-star-fill"></i>
          </div>
          <div class="summary-value">—</div>
          <div class="summary-label">No reviews yet</div>
        </div>
        <div class="summary-card">
          <div class="summary-icon-wrap green">
            <i class="bi bi-chat-square-text"></i>
          </div>
          <div class="summary-value">0</div>
          <div class="summary-label">Total reviews</div>
        </div>`;
    }

    // ── Render review list ─────────────────────────────────────
    function renderReviews(feedback, usersMap, itemsMap) {
      const countEl = document.getElementById('reviewsCount');
      countEl.textContent = `${feedback.length} review${feedback.length !== 1 ? 's' : ''}`;
      countEl.classList.remove('d-none');

      document.getElementById('reviewsList').innerHTML = feedback.map(f => {
        const reviewer  = f.fromUserId ? usersMap[f.fromUserId] : null;
        const name      = reviewer?.fullName || reviewer?.displayName || reviewer?.name || 'Anonymous';
        const photo     = reviewer?.photoURL || '';
        const item      = f.itemId ? itemsMap[f.itemId] : null;
        const itemName  = item?.title || item?.itemName || 'Unknown Item';
        const dateStr   = fmtDate(f.createdAt);
        const comment   = f.comment || f.review || '';

        const avatarHtml = photo
          ? `<img src="${escapeHtml(photo)}" alt="${escapeHtml(name)}" />`
          : escapeHtml(getInitial(name));

        const itemLink = f.itemId
          ? `<a href="item-detail.html?id=${escapeHtml(f.itemId)}" class="review-item-link">
               <i class="bi bi-box-seam"></i>${escapeHtml(itemName)}
             </a>`
          : `<span class="review-date">${escapeHtml(itemName)}</span>`;

        return `
          <div class="review-card">
            ${renderStars(f.rating, 'review-stars')}
            ${comment ? `<p class="review-comment">"${escapeHtml(comment)}"</p>` : ''}
            <div class="review-meta">
              <div class="review-avatar">${avatarHtml}</div>
              <span class="review-author">${escapeHtml(name)}</span>
              <span class="review-dot">•</span>
              <span class="review-date">${escapeHtml(dateStr)}</span>
              ${f.itemId ? `<span class="review-dot">•</span>${itemLink}` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function renderEmpty() {
      document.getElementById('reviewsSection').innerHTML = `
        <div class="ratings-empty">
          <i class="bi bi-star"></i>
          <h3>No ratings yet</h3>
          <p>Ratings and feedback from recipients will appear here after they successfully collect an item you donated.</p>
        </div>`;
    }

    // ── Sidebar collapse ───────────────────────────────────────
    document.getElementById('sidebarCollapseBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
      document.getElementById('gnMain').classList.toggle('sidebar-collapsed');
    });

    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.add('mobile-open');
      document.getElementById('sidebarOverlay').classList.add('active');
    });

    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('mobile-open');
      document.getElementById('sidebarOverlay').classList.remove('active');
    });

    // ── Switch account ─────────────────────────────────────────
    document.getElementById('switchAccountBtn').addEventListener('click', async () => {
      if (!currentUser) return;
      try {
        await updateDoc(doc(db, 'users', currentUser.uid), { role: 'recipient' });
        window.location.href = 'recipient-dashboard.html';
      } catch {
        showToast('Failed to switch account.', 'error');
      }
    });

    // ── Logout ─────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.href = 'login.html';
      } catch {
        showToast('Logout failed.', 'error');
      }
    });

  </script>
</body>
</html>
